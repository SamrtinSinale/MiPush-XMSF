name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 版本号
        required: false
        default: ''

permissions:
  contents: write

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install SDK platform 33
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-33" 2>&1 | tail -5 || echo "already installed"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore .yuuta.jks -alias mykey -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=,OU=,O=,L=,ST=,C="
          echo "KEY_LOCATE=../.yuuta.jks" > local.properties
          echo "KEYSTORE_PASSWORD=123456" >> local.properties
          echo "KEYSTORE_ALIAS=mykey" >> local.properties
          echo "KEY_PASSWORD=123456" >> local.properties

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get version
        id: version
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ -n "$VER" ]; then
            echo "name=$VER" >> $GITHUB_OUTPUT
            echo "tag=$VER" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            DESCRIBE="$(git describe --tags --exclude 'v*-*' 2>/dev/null || echo '0.0.0')"
            echo "name=$DESCRIBE" >> $GITHUB_OUTPUT
            echo "tag=$DESCRIBE" >> $GITHUB_OUTPUT
          fi

      - name: Build APK
        run: ./gradlew :push:assembleNormalRelease

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.name }}
          tag_name: ${{ steps.version.outputs.tag }}
          files: push/build/outputs/apk/normal/release/*.apk
          generate_release_notes: true
          make_latest: true
